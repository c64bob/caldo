name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build binaries
        run: |
          mkdir -p dist
          GOOS=linux GOARCH=amd64 go build -o dist/caldo-linux-amd64 ./cmd/caldo
          GOOS=linux GOARCH=arm64 go build -o dist/caldo-linux-arm64 ./cmd/caldo

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/caldo
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Build and push image
        id: buildpush
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 "$(git rev-list --tags --skip=1 --max-count=1)" 2>/dev/null || true)
          if [ -n "$PREV_TAG" ]; then
            LOG=$(git log --pretty=format:'- %s' "$PREV_TAG".."${GITHUB_REF_NAME}")
          else
            LOG=$(git log --pretty=format:'- %s')
          fi
          {
            echo 'body<<EOF'
            echo "Image digest: ${{ steps.buildpush.outputs.digest }}"
            echo
            echo "## Changelog"
            echo "$LOG"
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          body: ${{ steps.changelog.outputs.body }}
          files: |
            dist/caldo-linux-amd64
            dist/caldo-linux-arm64
